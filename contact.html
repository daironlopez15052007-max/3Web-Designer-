o?</label> <select name="Tiene_Hosting_Dominio"> <option value="No">No, necesito ayuda</option> <option value="Si">Sí, ya los tengo</option> <option value="Solo Dominio">Solo el dominio</option> <option value="Solo Hosting">Solo el hosting</option> </select> </div> <div class="budget-container"> <label>Presupuesto Estimado (USD)</label> <input type="range" name="Presupuesto_USD" min="100" max="1500" step="50" value="500" oninput="document.getElementById('val').innerText=this.value"> <div class="budget-value">$<span id="val">500</span> USD</div> </div> <button type="submit">Enviar Solicitud por Correo</button> </form> </div> </main> </body> </html>
